<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
<meta name="theme-color" content="#07080d" />
<link rel="manifest" href="manifest.webmanifest" />
<title>AETHER — Cinematic Experience</title>
<style>
/* ============================================================
   AETHER — reusable landscape-first cinematic microsite engine
   All theming via CSS variables. Content lives in the SCENES
   config object in JS. Replace assets/text/links there.
   ============================================================ */
:root{
  --bg:#07080d; --bg2:#0d1120; --ink:#f4f6fb; --muted:#9aa3b8;
  --accent:#c9a15a; --accent2:#6ea8ff; --glass:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.14); --ease:cubic-bezier(.7,0,.2,1);
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
  --font:"Helvetica Neue",Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100dvh; width:100vw; overflow:hidden; background:var(--bg);
  color:var(--ink); font-family:var(--font); overscroll-behavior:none;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
#app{
  position:fixed; inset:0; height:100dvh; width:100vw; overflow:hidden;
  padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
}
img{max-width:100%;display:block}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}

/* ---------- atmospheric background (shared) ---------- */
.env{position:absolute;inset:0;overflow:hidden;z-index:0;background:
  radial-gradient(120% 90% at 70% 10%,#141a30 0%,var(--bg2) 40%,var(--bg) 100%)}
.env .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.5;
  will-change:transform;mix-blend-mode:screen}
.orb.a{width:46vmax;height:46vmax;left:-8vmax;top:-14vmax;
  background:radial-gradient(circle,var(--accent) 0%,transparent 65%);
  animation:drift1 22s var(--ease) infinite alternate}
.orb.b{width:40vmax;height:40vmax;right:-10vmax;bottom:-16vmax;
  background:radial-gradient(circle,var(--accent2) 0%,transparent 65%);
  animation:drift2 26s var(--ease) infinite alternate}
.orb.c{width:26vmax;height:26vmax;left:40%;top:35%;opacity:.25;
  background:radial-gradient(circle,#b06cff 0%,transparent 60%);
  animation:drift1 30s var(--ease) infinite alternate-reverse}
.grain{position:absolute;inset:-50%;opacity:.05;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  animation:grain 6s steps(6) infinite}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 120% at 50% 50%,transparent 55%,rgba(0,0,0,.6) 100%)}
@keyframes drift1{to{transform:translate3d(6vmax,4vmax,0) scale(1.15)}}
@keyframes drift2{to{transform:translate3d(-5vmax,-6vmax,0) scale(1.2)}}
@keyframes grain{0%{transform:translate(0,0)}100%{transform:translate(8%,6%)}}

/* ---------- loader ---------- */
#loader{position:fixed;inset:0;z-index:100;display:grid;place-items:center;
  background:var(--bg);transition:opacity .8s var(--ease)}
#loader.hide{opacity:0;pointer-events:none}
.load-mark{font-size:clamp(20px,4vw,34px);letter-spacing:.5em;color:var(--muted);
  font-weight:300;padding-left:.5em}
.load-bar{width:min(40vw,220px);height:1px;margin-top:22px;background:var(--line);overflow:hidden}
.load-bar i{display:block;height:100%;width:40%;background:var(--accent);
  animation:load 1.1s var(--ease) infinite}
@keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}

/* ---------- portrait overlay ---------- */
#rotate{position:fixed;inset:0;z-index:90;display:none;place-items:center;
  text-align:center;background:linear-gradient(160deg,#0a0d18,#05060b)}
#rotate.show{display:grid}
.rot-inner{padding:0 12vw}
.phone{width:64px;height:104px;border:2px solid var(--accent);border-radius:12px;
  margin:0 auto 26px;position:relative;animation:rotHint 2.6s var(--ease) infinite}
.phone::after{content:"";position:absolute;left:50%;bottom:7px;width:22px;height:3px;
  border-radius:3px;background:var(--accent);transform:translateX(-50%)}
@keyframes rotHint{0%,30%{transform:rotate(0)}55%,80%{transform:rotate(-90deg)}100%{transform:rotate(-90deg)}}
#rotate h2{font-weight:300;letter-spacing:.28em;font-size:clamp(15px,4.4vw,20px);margin-bottom:10px}
#rotate p{color:var(--muted);font-size:13px;letter-spacing:.05em;max-width:320px;margin:0 auto}
.rot-skip{margin-top:26px;font-size:11px;letter-spacing:.24em;color:var(--muted);
  border-bottom:1px solid var(--line);padding-bottom:3px;text-transform:uppercase}

/* ---------- scenes ---------- */
.stage{position:absolute;inset:0;z-index:1}
.scene{position:absolute;inset:0;display:grid;place-items:center;opacity:0;
  visibility:hidden;pointer-events:none;
  transition:opacity .9s var(--ease),transform .9s var(--ease),filter .9s var(--ease)}
.scene.active{opacity:1;visibility:visible;pointer-events:auto}
/* transition variants (applied to leaving/entering scenes) */
.scene.enter-zoom{transform:scale(1.12);filter:blur(8px)}
.scene.enter-zoom.active{transform:scale(1);filter:blur(0)}
.scene.leave-zoom{transform:scale(.92);filter:blur(10px);opacity:0}
.scene.enter-pan{transform:translateX(8%)}
.scene.enter-pan.active{transform:translateX(0)}
.scene.leave-pan{transform:translateX(-8%);opacity:0}
.scene.enter-mask{clip-path:inset(0 0 100% 0)}
.scene.enter-mask.active{clip-path:inset(0 0 0 0);transition:clip-path 1s var(--ease),opacity .9s var(--ease)}
.scene.leave-mask{clip-path:inset(100% 0 0 0);opacity:0;transition:clip-path 1s var(--ease),opacity .9s var(--ease)}

.wrap{position:relative;z-index:2;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(20px,5vh,48px) clamp(28px,7vw,90px)}

/* depth text reveal */
.rise{opacity:0;transform:translateY(26px) translateZ(0);
  animation:rise .9s var(--ease) forwards}
.scene.active .rise{animation-play-state:running}
.d1{animation-delay:.15s}.d2{animation-delay:.32s}.d3{animation-delay:.5s}.d4{animation-delay:.68s}
@keyframes rise{to{opacity:1;transform:translateY(0)}}

.eyebrow{font-size:clamp(10px,1.6vw,12px);letter-spacing:.42em;text-transform:uppercase;
  color:var(--accent);margin-bottom:14px}
.title{font-size:clamp(34px,8.5vw,94px);line-height:.94;font-weight:200;letter-spacing:-.01em}
.title b{font-weight:600}
.title .glow{text-shadow:0 0 40px rgba(201,161,90,.35)}
.lede{margin-top:16px;max-width:min(52ch,60%);color:var(--muted);
  font-size:clamp(13px,2vw,16px);line-height:1.55;font-weight:300}

/* buttons / links */
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.btn{position:relative;display:inline-flex;align-items:center;gap:10px;
  min-height:46px;padding:0 24px;border-radius:40px;font-size:13px;letter-spacing:.14em;
  text-transform:uppercase;background:var(--glass);border:1px solid var(--line);
  backdrop-filter:blur(10px);transition:.4s var(--ease);overflow:hidden}
.btn:hover,.btn:focus-visible{border-color:var(--accent);transform:translateY(-2px);outline:none}
.btn.solid{background:linear-gradient(120deg,var(--accent),#e8c98a);color:#1a1206;border-color:transparent}
.btn .arr{transition:transform .4s var(--ease)}
.btn:hover .arr{transform:translateX(4px)}

/* hotspots */
.hotspot{position:absolute;width:44px;height:44px;border-radius:50%;z-index:3;
  display:grid;place-items:center;transform:translate(-50%,-50%)}
.hotspot .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 0 rgba(201,161,90,.5);animation:pulse 2.4s var(--ease) infinite}
.hotspot .ring{position:absolute;inset:0;border:1px solid var(--line);border-radius:50%;
  transition:.4s var(--ease)}
.hotspot:hover .ring,.hotspot:focus-visible .ring{transform:scale(1.25);border-color:var(--accent);outline:none}
.hotspot .lbl{position:absolute;left:52px;white-space:nowrap;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink);background:rgba(0,0,0,.5);padding:6px 12px;border-radius:20px;
  border:1px solid var(--line);opacity:0;transform:translateX(-6px);transition:.4s var(--ease);pointer-events:none}
.hotspot:hover .lbl,.hotspot:focus-visible .lbl{opacity:1;transform:translateX(0)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(201,161,90,.5)}70%{box-shadow:0 0 0 16px rgba(201,161,90,0)}100%{box-shadow:0 0 0 0 rgba(201,161,90,0)}}

/* info modal */
#modal{position:absolute;inset:0;z-index:20;display:none;place-items:center;
  padding:clamp(16px,4vh,40px) clamp(20px,6vw,70px);
  background:rgba(4,5,10,.55);backdrop-filter:blur(6px);opacity:0;transition:opacity .5s var(--ease)}
#modal.show{display:grid;opacity:1}
.card{width:min(760px,92%);max-height:82dvh;display:flex;flex-direction:column;
  background:linear-gradient(160deg,rgba(24,28,44,.85),rgba(10,12,20,.9));
  border:1px solid var(--line);border-radius:20px;overflow:hidden;
  transform:translateY(20px) scale(.97);transition:.5s var(--ease)}
#modal.show .card{transform:none}
.card-head{display:flex;align-items:center;justify-content:space-between;
  padding:20px 26px;border-bottom:1px solid var(--line)}
.card-head h3{font-weight:300;letter-spacing:.12em;font-size:clamp(16px,3vw,22px)}
.card-close{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  display:grid;place-items:center;font-size:18px;transition:.3s var(--ease)}
.card-close:hover{border-color:var(--accent);transform:rotate(90deg)}
.tabs{display:flex;gap:6px;padding:14px 26px 0;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);border:1px solid transparent;transition:.3s var(--ease)}
.tab.active{color:var(--ink);border-color:var(--line);background:var(--glass)}
.tab-body{padding:20px 26px 26px;overflow:hidden;flex:1}
.panel{display:none;animation:fade .5s var(--ease)}
.panel.active{display:block}
.panel p{color:var(--muted);font-size:14px;line-height:1.6;font-weight:300;max-width:60ch}
.spec{display:grid;grid-template-columns:1fr 1fr;gap:12px 28px;margin-top:6px}
.spec div{border-bottom:1px solid var(--line);padding-bottom:8px}
.spec span{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.spec b{font-weight:400;font-size:14px}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

/* HUD: nav dots + controls */
.hud{position:absolute;z-index:15;pointer-events:none}
.hud *{pointer-events:auto}
.dots{left:clamp(20px,5vw,44px);top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:14px}
.dots button{width:9px;height:9px;border-radius:50%;border:1px solid var(--line);
  background:transparent;transition:.4s var(--ease)}
.dots button.on{background:var(--accent);border-color:var(--accent);transform:scale(1.2)}
.ctrls{right:clamp(20px,5vw,44px);top:clamp(18px,4vh,30px);display:flex;gap:10px}
.ic{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
  background:rgba(0,0,0,.3);backdrop-filter:blur(8px);display:grid;place-items:center;
  transition:.3s var(--ease)}
.ic:hover{border-color:var(--accent)}
.ic svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:1.5}
.ic.off svg .on-path{display:none}
.brand-tag{left:clamp(20px,5vw,44px);top:clamp(18px,4vh,30px);
  font-size:12px;letter-spacing:.42em;font-weight:300;color:var(--ink)}
.scene-count{right:clamp(20px,5vw,44px);bottom:clamp(18px,4vh,30px);
  font-size:11px;letter-spacing:.2em;color:var(--muted)}
.scene-count b{color:var(--ink);font-weight:400}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001s!important;transition-duration:.15s!important}
  .orb,.grain{animation:none!important}
}
/* short landscape phones: tighten type */
@media (max-height:430px){
  .title{font-size:clamp(28px,10vw,60px)}
  .lede{max-width:70%;font-size:13px}
  .wrap{padding:16px clamp(24px,7vw,70px)}
}
</style>
</head>
<body>

<div id="loader"><div style="text-align:center">
  <div class="load-mark" id="loadMark">AETHER</div>
  <div class="load-bar"><i></i></div>
</div></div>

<div id="rotate">
  <div class="rot-inner">
    <div class="phone"></div>
    <h2>ROTATE YOUR DEVICE</h2>
    <p>This experience is composed for landscape. Turn your phone sideways to begin.</p>
    <button class="rot-skip" id="skipPortrait">Continue anyway</button>
  </div>
</div>

<div id="app" aria-label="Cinematic experience">
  <div class="env">
    <div class="orb a"></div><div class="orb b"></div><div class="orb c"></div>
    <div class="grain"></div><div class="vignette"></div>
  </div>

  <div class="stage" id="stage"><!-- scenes injected --></div>

  <!-- info modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div class="card">
      <div class="card-head"><h3 id="mTitle">Detail</h3>
        <button class="card-close" id="mClose" aria-label="Close">&times;</button></div>
      <div class="tabs" id="mTabs"></div>
      <div class="tab-body" id="mBody"></div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud brand-tag" id="brandTag">AETHER</div>
  <div class="hud dots" id="dots" role="tablist" aria-label="Scenes"></div>
  <div class="hud ctrls">
    <button class="ic off" id="soundBtn" aria-label="Toggle sound">
      <svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path class="on-path" d="M16 8a5 5 0 0 1 0 8"/><path class="on-path" d="M19 5a9 9 0 0 1 0 14"/></svg>
    </button>
    <button class="ic" id="homeBtn" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></button>
  </div>
  <div class="hud scene-count" id="sceneCount"><b>01</b> / 04</div>
</div>

<script>
/* =====================================================================
   SCENES CONFIG  — replace text / links / hotspot positions here.
   This is the only block a new client project needs to edit.
   ===================================================================== */
const BRAND = "AETHER";
const SCENES = [
  { id:"intro", trans:"zoom",
    eyebrow:"A Cinematic Presentation",
    title:'Enter the <b class="glow">Experience</b>',
    lede:"A reusable landscape-first microsite engine for artists, luxury brands, product launches, portfolios and properties.",
    ctas:[{label:"Explore",style:"solid",go:1},{label:"Skip Intro",go:3}]
  },
  { id:"story", trans:"pan",
    eyebrow:"Visual Story",
    title:'Light, <b>Depth</b><br>& Motion',
    lede:"Every frame is composed. Tap the points of interest to reveal detail without ever leaving the scene.",
    ctas:[{label:"Continue",style:"solid",go:2}],
    hotspots:[
      {x:"72%",y:"38%",label:"Material",modal:"material"},
      {x:"30%",y:"64%",label:"Craft",modal:"craft"},
      {x:"85%",y:"72%",label:"Origin",modal:"origin"}
    ]
  },
  { id:"info", trans:"mask",
    eyebrow:"Information",
    title:'The <b>Detail</b>',
    lede:"Product specs, an artist profile, property facts or portfolio notes — delivered in compact panels that always fit the screen.",
    ctas:[{label:"Open Profile",style:"solid",modal:"profile"},{label:"Next",go:3}]
  },
  { id:"cta", trans:"zoom",
    eyebrow:"Take Action",
    title:'Begin the<br><b class="glow">Journey</b>',
    lede:"Placeholder actions — wire these to real links, checkout, streaming or WhatsApp per client.",
    ctas:[
      {label:"Book",style:"solid",href:"#book"},
      {label:"Buy",href:"#buy"},
      {label:"Listen",href:"#listen"},
      {label:"WhatsApp",href:"https://wa.me/000000000"},
      {label:"↺ Restart",go:0}
    ]
  }
];
/* modal content — tabbed, no scrolling */
const MODALS = {
  material:{title:"Material",tabs:[
    {name:"Overview",html:"<p>Aerospace-grade titanium with a hand-brushed finish. Replace this copy with real product or artwork detail.</p>"},
    {name:"Specs",html:spec([["Finish","Brushed"],["Weight","41 g"],["Grade","5 Ti"],["Origin","In-house"]])}
  ]},
  craft:{title:"Craft",tabs:[
    {name:"Process",html:"<p>120 hours of assembly per unit. Swap for your studio's story, technique or provenance.</p>"},
    {name:"Numbers",html:spec([["Hours","120"],["Artisans","4"],["Edition","250"],["Year","2026"]])}
  ]},
  origin:{title:"Origin",tabs:[
    {name:"Place",html:"<p>Designed in Hyderabad, composed for a global audience. Editable placeholder narrative.</p>"}
  ]},
  profile:{title:"Profile",tabs:[
    {name:"Bio",html:"<p>A short artist / brand / property bio goes here — kept deliberately brief and cinematic. Two or three sentences at most.</p>"},
    {name:"Highlights",html:spec([["Founded","2024"],["Projects","30+"],["Awards","5"],["Base","Hyderabad"]])},
    {name:"Contact",html:"<p>hello@example.com<br>+91 00000 00000<br>@yourhandle</p>"}
  ]}
};
function spec(rows){return '<div class="spec">'+rows.map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')+'</div>';}

/* =====================================================================
   ENGINE — no need to edit below for content changes.
   ===================================================================== */
const stage=document.getElementById('stage'), dotsEl=document.getElementById('dots'),
  modal=document.getElementById('modal'), mTitle=document.getElementById('mTitle'),
  mTabs=document.getElementById('mTabs'), mBody=document.getElementById('mBody'),
  countEl=document.getElementById('sceneCount'), brandTag=document.getElementById('brandTag');
let current=0, busy=false, soundOn=false, audio=null;
brandTag.textContent=BRAND; document.getElementById('loadMark').textContent=BRAND;

/* build scenes */
SCENES.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='scene'; el.dataset.i=i; el.setAttribute('role','tabpanel');
  const spots=(s.hotspots||[]).map((h,hi)=>
    `<button class="hotspot" style="left:${h.x};top:${h.y}" data-modal="${h.modal}" aria-label="${h.label}">
       <span class="ring"></span><span class="dot"></span><span class="lbl">${h.label}</span></button>`).join('');
  const ctas=(s.ctas||[]).map(c=>{
    const cls='btn'+(c.style==='solid'?' solid':'');
    const attr=c.href?`data-href="${c.href}"`:c.modal?`data-modal="${c.modal}"`:`data-go="${c.go}"`;
    return `<button class="${cls}" ${attr}>${c.label}<span class="arr">→</span></button>`;
  }).join('');
  el.innerHTML=`${spots}<div class="wrap">
    <div class="eyebrow rise d1">${s.eyebrow||''}</div>
    <h1 class="title rise d2">${s.title||''}</h1>
    <p class="lede rise d3">${s.lede||''}</p>
    <div class="cta-row rise d4">${ctas}</div></div>`;
  stage.appendChild(el);
  const d=document.createElement('button'); d.setAttribute('role','tab');
  d.setAttribute('aria-label','Scene '+(i+1)); d.onclick=()=>goTo(i); dotsEl.appendChild(d);
});
const scenes=[...document.querySelectorAll('.scene')];

function goTo(n){
  if(busy||n===current||n<0||n>=scenes.length)return;
  busy=true;
  const from=scenes[current], to=scenes[n], t=SCENES[n].trans||'zoom';
  from.classList.add('leave-'+t);
  to.classList.add('enter-'+t);
  // reflow then activate
  void to.offsetWidth;
  to.classList.add('active');
  from.classList.remove('active');
  updateHUD(n);
  setTimeout(()=>{
    from.classList.remove('leave-'+t,'enter-zoom','enter-pan','enter-mask');
    from.className='scene';
    // restart rise animations on incoming
    to.querySelectorAll('.rise').forEach(r=>{r.style.animation='none';void r.offsetWidth;r.style.animation='';});
    to.classList.remove('enter-'+t);
    current=n; busy=false;
  },1000);
}
function updateHUD(n){
  [...dotsEl.children].forEach((d,i)=>d.classList.toggle('on',i===n));
  countEl.innerHTML=`<b>${String(n+1).padStart(2,'0')}</b> / ${String(scenes.length).padStart(2,'0')}`;
}

/* delegated actions */
document.getElementById('app').addEventListener('click',e=>{
  const b=e.target.closest('[data-go],[data-modal],[data-href]'); if(!b)return;
  if(b.dataset.go!==undefined) goTo(+b.dataset.go);
  else if(b.dataset.modal) openModal(b.dataset.modal);
  else if(b.dataset.href){ const h=b.dataset.href;
    if(h.startsWith('http')) window.open(h,'_blank','noopener'); /* else placeholder */ }
});

/* modal */
function openModal(key){
  const m=MODALS[key]; if(!m)return;
  mTitle.textContent=m.title;
  mTabs.innerHTML=m.tabs.map((t,i)=>`<button class="tab${i?'':' active'}" data-t="${i}">${t.name}</button>`).join('');
  mBody.innerHTML=m.tabs.map((t,i)=>`<div class="panel${i?'':' active'}" data-p="${i}">${t.html}</div>`).join('');
  modal.classList.add('show');
}
function closeModal(){modal.classList.remove('show');}
mTabs.addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
  const i=t.dataset.t;
  mTabs.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  mBody.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.p===i));});
document.getElementById('mClose').onclick=closeModal;
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});

/* controls */
document.getElementById('homeBtn').onclick=()=>{closeModal();goTo(0);};
const soundBtn=document.getElementById('soundBtn');
soundBtn.onclick=()=>{soundOn=!soundOn;soundBtn.classList.toggle('off',!soundOn);
  /* hook real audio here: if(soundOn) audio.play(); else audio.pause(); */};

/* keyboard */
addEventListener('keydown',e=>{
  if(e.key==='Escape'){modal.classList.contains('show')?closeModal():goTo(0);}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(current+1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(current-1);
});
/* horizontal swipe on stage (does not block pinch/scroll globally) */
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)) goTo(current+(dx<0?1:-1));
},{passive:true});

/* portrait / orientation */
const rotate=document.getElementById('rotate');
let portraitDismissed=false;
function checkOrient(){
  const portrait=matchMedia('(orientation:portrait)').matches && innerWidth<820;
  if(portrait && !portraitDismissed) rotate.classList.add('show');
  else rotate.classList.remove('show');
}
matchMedia('(orientation:portrait)').addEventListener('change',checkOrient);
addEventListener('resize',checkOrient);
document.getElementById('skipPortrait').onclick=()=>{portraitDismissed=true;rotate.classList.remove('show');};

/* entry: fullscreen + orientation lock, both optional */
async function enterExperience(){
  try{ await document.documentElement.requestFullscreen?.({navigationUI:"hide"}); }catch{}
  try{ await screen.orientation?.lock?.("landscape"); }catch{}
  startExperience();
}
function startExperience(){
  scenes[0].classList.add('active','enter-zoom');
  void scenes[0].offsetWidth; scenes[0].classList.remove('enter-zoom');
  updateHUD(0); checkOrient();
}

/* boot: loader, then auto-start after first paint.
   NOTE: real fullscreen/orientation need a user gesture — the Enter
   button in scene 1 (Explore) is a safe place; we also expose enterExperience
   on first tap anywhere for phones. */
let entered=false;
function firstGesture(){ if(entered)return; entered=true; enterExperience(); }
addEventListener('pointerdown',firstGesture,{once:true});

window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('hide');
    startExperience();
  },1100);
});
</script>
</body>
